# Nginx load balancer config for the notification-system demo.
#
# THE CRITICAL PART: WebSocket connections start as a normal HTTP request
# with an "Upgrade: websocket" header, then the connection protocol switches.
# Nginx does NOT forward the Upgrade/Connection headers to the backend by
# default - without the map + proxy_set_header lines below, the WebSocket
# handshake would silently fail (or fall back to polling, if a client
# supports it) even though plain HTTP requests through the same proxy work
# fine. This is the single most common way an Nginx + WebSocket setup breaks,
# and it's NOT obvious from a quick glance at a "basic" nginx.conf example.

# Maps the incoming Upgrade header to what we forward as Connection.
# If Upgrade is present (a WebSocket handshake), forward Connection: upgrade.
# If absent (a normal HTTP request), forward Connection: close.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream notification_backend {
    # Round-robin by default (no special directive needed) - this is
    # DELIBERATE for the demo: round-robin across requests, NOT sticky
    # sessions, makes it easy to prove that a client connected to Instance A
    # still receives a notification published via Instance B. If we used
    # session affinity (ip_hash or similar), every request from one client
    # would always land on the same instance, which would hide the entire
    # point of the Redis Pub/Sub relay.
    server app1:8080;
    server app2:8080;
}

server {
    listen 80;

    location / {
        proxy_pass http://notification_backend;

        # Standard proxy headers - so the backend sees the real client info,
        # not just "request came from Nginx."
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # THE WEBSOCKET-SPECIFIC PART:
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # WebSocket connections are long-lived - Nginx's default proxy
        # timeouts (60s) would silently kill an idle-but-still-subscribed
        # WebSocket connection. Extend generously for a demo environment.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
